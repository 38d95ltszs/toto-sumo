# トト相撲 — 取組データ自動更新（.github/workflows/update-data.yml に配置）
# どのトリガーで起動しても、JST 14:50〜19:00 の間なら10分毎のライブループになる
# （GitHubのcron遅延・間引き対策。起動さえすればループが成立する）
name: update sumo data

on:
  schedule:
    - cron: "45 5 * * *"   # JST 14:45 ライブループ起動狙い（千秋楽の前倒しにも対応）
    - cron: "50 6 * * *"   # JST 15:50 予備の起動
    - cron: "15 10 * * *"  # JST 19:15 最終確定
    - cron: "15 23 * * *"  # JST 翌朝8:15 翌日取組の取りこぼし回収
    - cron: "5 0-5 * * *"  # JST 9:05〜14:05 毎時（ニュース鮮度維持）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: fetch (取組時間帯は自動でライブループ)
        run: |
          git config user.name "toto-sumo-bot"
          git config user.email "actions@users.noreply.github.com"

          fetch_once() {
            node scraper/fetch_basho.mjs || true
            git add data/basho.json || true
            if git diff --cached --quiet; then
              echo "変更なし"
            else
              git commit -m "data: $(TZ=Asia/Tokyo date +'%m-%d %H:%M')"
              git pull --rebase origin main || true
              git push || true
            fi
          }

          HM=$(TZ=Asia/Tokyo date +%H%M)
          if [ "$HM" -ge 1450 ] && [ "$HM" -lt 1900 ]; then
            echo "===== ライブループ開始（〜19:00 JST・10分間隔） ====="
            while [ "$(TZ=Asia/Tokyo date +%H%M)" -lt 1900 ]; do
              echo "== cycle $(TZ=Asia/Tokyo date +'%H:%M') =="
              fetch_once
              sleep 600
            done
            echo "== 最終サイクル =="
            fetch_once
          else
            fetch_once
          fi
